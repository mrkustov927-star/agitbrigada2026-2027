<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">Фирменный фон проекта «Фронтовая агитбригада»</title>
  <desc id="desc">Старая бумага, красные мазки, карта Карельского фронта, самолёты, письма и силуэты агитбригады</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#ead3aa"/>
      <stop offset=".45" stop-color="#f3dfba"/>
      <stop offset="1" stop-color="#d3aa72"/>
    </linearGradient>
    <radialGradient id="fade" cx="38%" cy="45%" r="75%">
      <stop stop-color="#fff3d8" stop-opacity=".72"/>
      <stop offset="1" stop-color="#8a5426" stop-opacity=".14"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="4" seed="19" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="soft">
        <feFuncA type="table" tableValues="0 .18"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="soft" mode="multiply"/>
    </filter>
    <filter id="rough" x="-10%" y="-30%" width="120%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency=".018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#4e3827" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="760" fill="url(#paper)"/>
  <rect width="1600" height="760" fill="url(#fade)"/>
  <rect width="1600" height="760" fill="url(#grid)"/>

  <g filter="url(#rough)" opacity=".92">
    <path d="M-80 115C170 15 315 36 570 147 415 184 287 224 87 327-35 259-89 190-80 115Z" fill="#9e2019"/>
    <path d="M-42 255C160 180 302 195 536 296 357 302 198 340 5 436Z" fill="#7c1718" opacity=".78"/>
    <path d="M114 548c237-74 473-91 782-33-178 19-352 63-572 149Z" fill="#a3261e" opacity=".22"/>
  </g>

  <g transform="translate(965 20)" fill="none" stroke="#49321f" stroke-opacity=".38" stroke-width="2">
    <path d="M12 20c65 51 121 53 165 93 43 40 53 91 106 118 49 25 88 4 135 27 57 29 79 89 139 115 39 16 72 10 119 34"/>
    <path d="M43 107c71-15 123 12 183 54 68 48 139 51 203 91 64 39 98 101 171 135"/>
    <path d="M136 3c-5 78 18 121 29 187 11 63-4 113 13 171 19 63 70 102 84 169"/>
