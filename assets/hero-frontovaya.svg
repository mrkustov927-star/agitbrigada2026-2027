    <path d="M1018 120l63 10 28-20 7 5-16 21 29 5-2 10-35-3-18 21-8-4 9-21-60-9Z" opacity=".72"/>
    <path d="M1173 176l54 8 23-17 6 4-13 18 25 4-2 8-29-2-16 18-7-3 8-18-51-8Z" opacity=".58"/>
