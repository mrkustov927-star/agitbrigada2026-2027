  <rect width="1600" height="760" fill="transparent" filter="url(#grain)"/>
  <path d="M9 10C350 2 690 22 1019 9c212-8 393-4 570 8M8 748c394-16 746 14 1090 1 196-7 346-2 492-14" fill="none" stroke="#5f3f22" stroke-opacity=".45" stroke-width="5"/>
