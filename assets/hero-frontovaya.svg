    <text x="18" y="56" fill="#49321f" stroke="none" font-family="Georgia,serif" font-size="24">КАРЕЛЬСКИЙ ФРОНТ</text>
    <text x="450" y="88" fill="#49321f" stroke="none" font-family="Georgia,serif" font-size="20">1941—1944</text>
  </g>

  <g fill="#2a2118" opacity=".78">
